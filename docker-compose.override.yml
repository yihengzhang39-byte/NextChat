services:
  postgres:
    image: postgres:16-alpine
    container_name: iflytek-chat-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iflytek_chat}
      POSTGRES_USER: ${POSTGRES_USER:-iflytek_chat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iflytek_chat_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - iflytek-chat-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iflytek_chat}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    profiles: ["no-proxy", "proxy"]
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: iflytek-chat-migrate:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://iflytek_chat:iflytek_chat_dev@postgres:5432/iflytek_chat?schema=public}
      - CHAT_UPLOAD_DIR=${CHAT_UPLOAD_DIR:-/data/chat-uploads}
    command: yarn prisma:migrate
    restart: "no"
  chatgpt-next-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: iflytek-chat:local
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://iflytek_chat:iflytek_chat_dev@postgres:5432/iflytek_chat?schema=public}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-dev-admin-token}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-image@Iflytek}
      - VISION_MODELS=${VISION_MODELS:-image}
      - XF_APPID=${XF_APPID:-}
      - XF_API_KEY=${XF_API_KEY:-}
      - XF_API_SECRET=${XF_API_SECRET:-}
      - IFLYTEK_API_KEY=${IFLYTEK_API_KEY:-}
      - IFLYTEK_API_SECRET=${IFLYTEK_API_SECRET:-}
      - IFLYTEK_APP_ID=${IFLYTEK_APP_ID:-}
      - IFLYTEK_IMAGE_WS_HOST=${IFLYTEK_IMAGE_WS_HOST:-spark-image-api-test.xf-yun.com}
      - IFLYTEK_IMAGE_WS_PATH=${IFLYTEK_IMAGE_WS_PATH:-/v2.1/image}
      - IFLYTEK_IMAGE_MODEL=${IFLYTEK_IMAGE_MODEL:-imagev4}
      - SMS_CODE_SECRET=${SMS_CODE_SECRET:-dev-sms-secret}
      - ALIYUN_ACCESS_KEY_ID=${ALIYUN_ACCESS_KEY_ID:-}
      - ALIYUN_ACCESS_KEY_SECRET=${ALIYUN_ACCESS_KEY_SECRET:-}
      - ALIYUN_SMS_SIGN_NAME=${ALIYUN_SMS_SIGN_NAME:-}
      - ALIYUN_SMS_TEMPLATE_CODE=${ALIYUN_SMS_TEMPLATE_CODE:-}
      - ALIYUN_SMS_TEMPLATE_PARAM_KEY=${ALIYUN_SMS_TEMPLATE_PARAM_KEY:-code}
      - FILING_TEST_LOGIN_ENABLED=${FILING_TEST_LOGIN_ENABLED:-true}
      - FILING_TEST_LOGIN_CODE=${FILING_TEST_LOGIN_CODE:-123456}
      - IDENTITY_VERIFY_PROVIDER=${IDENTITY_VERIFY_PROVIDER:-}
      - IDENTITY_VERIFY_MOCK_MODE=${IDENTITY_VERIFY_MOCK_MODE:-}
      - IDENTITY_VERIFY_MOCK_AGE_PROFILE=${IDENTITY_VERIFY_MOCK_AGE_PROFILE:-}
      - IDENTITY_VERIFY_MOCK_BIRTH_DATE=${IDENTITY_VERIFY_MOCK_BIRTH_DATE:-}
      - IDENTITY_VERIFY_MOCK_TEST_ID_NUMBER=${IDENTITY_VERIFY_MOCK_TEST_ID_NUMBER:-}
      - IDENTITY_VERIFY_ALLOW_MOCK_IN_PRODUCTION=${IDENTITY_VERIFY_ALLOW_MOCK_IN_PRODUCTION:-false}
      - IDENTITY_VERIFY_ALIYUN_MARKET_APP_KEY=${IDENTITY_VERIFY_ALIYUN_MARKET_APP_KEY:-}
      - IDENTITY_VERIFY_ALIYUN_MARKET_APP_SECRET=${IDENTITY_VERIFY_ALIYUN_MARKET_APP_SECRET:-}
      - IDENTITY_VERIFY_ALIYUN_MARKET_HOST=${IDENTITY_VERIFY_ALIYUN_MARKET_HOST:-https://checkone.market.alicloudapi.com}
      - IDENTITY_VERIFY_ALIYUN_MARKET_PATH=${IDENTITY_VERIFY_ALIYUN_MARKET_PATH:-/communication/personal/10101}
      - IDENTITY_VERIFY_ALIYUN_MARKET_TIMEOUT_MS=${IDENTITY_VERIFY_ALIYUN_MARKET_TIMEOUT_MS:-15000}
      - IDENTITY_DATA_ENCRYPTION_KEY=${IDENTITY_DATA_ENCRYPTION_KEY:-}
      - IDENTITY_ID_NUMBER_HMAC_KEY=${IDENTITY_ID_NUMBER_HMAC_KEY:-}
    volumes:
      - ./data/chat-uploads:/data/chat-uploads

  chatgpt-next-web-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: iflytek-chat:local
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://iflytek_chat:iflytek_chat_dev@postgres:5432/iflytek_chat?schema=public}
      - CHAT_UPLOAD_DIR=${CHAT_UPLOAD_DIR:-/data/chat-uploads}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-dev-admin-token}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-image@Iflytek}
      - VISION_MODELS=${VISION_MODELS:-image}
      - XF_APPID=${XF_APPID:-}
      - XF_API_KEY=${XF_API_KEY:-}
      - XF_API_SECRET=${XF_API_SECRET:-}
      - IFLYTEK_API_KEY=${IFLYTEK_API_KEY:-}
      - IFLYTEK_API_SECRET=${IFLYTEK_API_SECRET:-}
      - IFLYTEK_APP_ID=${IFLYTEK_APP_ID:-}
      - IFLYTEK_IMAGE_WS_HOST=${IFLYTEK_IMAGE_WS_HOST:-spark-image-api-test.xf-yun.com}
      - IFLYTEK_IMAGE_WS_PATH=${IFLYTEK_IMAGE_WS_PATH:-/v2.1/image}
      - IFLYTEK_IMAGE_MODEL=${IFLYTEK_IMAGE_MODEL:-imagev4}
      - SMS_CODE_SECRET=${SMS_CODE_SECRET:-dev-sms-secret}
      - ALIYUN_ACCESS_KEY_ID=${ALIYUN_ACCESS_KEY_ID:-}
      - ALIYUN_ACCESS_KEY_SECRET=${ALIYUN_ACCESS_KEY_SECRET:-}
      - ALIYUN_SMS_SIGN_NAME=${ALIYUN_SMS_SIGN_NAME:-}
      - ALIYUN_SMS_TEMPLATE_CODE=${ALIYUN_SMS_TEMPLATE_CODE:-}
      - ALIYUN_SMS_TEMPLATE_PARAM_KEY=${ALIYUN_SMS_TEMPLATE_PARAM_KEY:-code}
      - FILING_TEST_LOGIN_ENABLED=${FILING_TEST_LOGIN_ENABLED:-true}
      - FILING_TEST_LOGIN_CODE=${FILING_TEST_LOGIN_CODE:-123456}
      - IDENTITY_VERIFY_PROVIDER=${IDENTITY_VERIFY_PROVIDER:-}
      - IDENTITY_VERIFY_MOCK_MODE=${IDENTITY_VERIFY_MOCK_MODE:-}
      - IDENTITY_VERIFY_MOCK_AGE_PROFILE=${IDENTITY_VERIFY_MOCK_AGE_PROFILE:-}
      - IDENTITY_VERIFY_MOCK_BIRTH_DATE=${IDENTITY_VERIFY_MOCK_BIRTH_DATE:-}
      - IDENTITY_VERIFY_MOCK_TEST_ID_NUMBER=${IDENTITY_VERIFY_MOCK_TEST_ID_NUMBER:-}
      - IDENTITY_VERIFY_ALLOW_MOCK_IN_PRODUCTION=${IDENTITY_VERIFY_ALLOW_MOCK_IN_PRODUCTION:-false}
      - IDENTITY_VERIFY_ALIYUN_MARKET_APP_KEY=${IDENTITY_VERIFY_ALIYUN_MARKET_APP_KEY:-}
      - IDENTITY_VERIFY_ALIYUN_MARKET_APP_SECRET=${IDENTITY_VERIFY_ALIYUN_MARKET_APP_SECRET:-}
      - IDENTITY_VERIFY_ALIYUN_MARKET_HOST=${IDENTITY_VERIFY_ALIYUN_MARKET_HOST:-https://checkone.market.alicloudapi.com}
      - IDENTITY_VERIFY_ALIYUN_MARKET_PATH=${IDENTITY_VERIFY_ALIYUN_MARKET_PATH:-/communication/personal/10101}
      - IDENTITY_VERIFY_ALIYUN_MARKET_TIMEOUT_MS=${IDENTITY_VERIFY_ALIYUN_MARKET_TIMEOUT_MS:-15000}
      - IDENTITY_DATA_ENCRYPTION_KEY=${IDENTITY_DATA_ENCRYPTION_KEY:-}
      - IDENTITY_ID_NUMBER_HMAC_KEY=${IDENTITY_ID_NUMBER_HMAC_KEY:-}
    volumes:
      - ./data/chat-uploads:/data/chat-uploads

volumes:
  iflytek-chat-postgres:
